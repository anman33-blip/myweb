<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>即時回報系統</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  background:#f5f6fa;
  font-size:18px;
}

/* HEADER */
.header {
  background:#2f3542;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#userNow {
  font-size:14px;
  opacity:0.9;
}

.header-right {
  display:flex;
  gap:8px;
}

.header-btn {
  padding:6px 10px;
  font-size:12px;
  border:none;
  border-radius:8px;
  color:white;
}

.clear-btn { background:#ff4757; }
.logout-btn { background:#57606f; }

/* LOGIN */
#login {
  text-align:center;
  margin-top:60px;
}

input {
  padding:14px;
  width:80%;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
}

.login-btn {
  margin-top:15px;
  padding:14px 40px;
  border:none;
  background:#3742fa;
  color:white;
  border-radius:10px;
}

/* MAIN */
#main { display:none; }

/* BUTTONS */
.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:12px;
}

button.action {
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:white;
}

.btn1 { background:#ff4757; }
.btn2 { background:#1e90ff; }
.btn3 { background:#2ed573; }
.btn4 { background:#ffa502; }
.btn5 { background:#a55eea; }
.btn6 { background:#2f3542; }
.btn7 { background:#00c3ff; }
.btn8 { background:#2ed573; }

/* 手動輸入 */
.manual {
  display:flex;
  gap:8px;
  padding:12px;
}

.manual input {
  flex:1;
  padding:12px;
}

.manual button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#57606f;
  color:white;
}

/* CHAT */
#chat {
  padding:12px;
  height:45vh;
  overflow-y:auto;
}

.msg {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.msg.latest {
  background:#e8f4ff;
  border-left:4px solid #1e90ff;
}

/* row 排版 */
.row {
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center; /* ⭐置中 */
}

/* 名字 */
.name {
  font-weight:bold;
  min-width:60px;
  white-space:nowrap;
}

/* 動作 */
.action {
  flex:1;
  word-break:break-word;
  min-width:0;
}

/* 時間 */
.time {
  font-size:12px;
  color:gray;
  min-width:120px;
  text-align:right;
  white-space:pre-line;
  line-height:1.2;
}

/* ⭐回收按鈕（自適應版） */
.recycle-btn {
  writing-mode: vertical-rl;
  text-orientation: upright;
}

/* 倒數條 */
.undo-bar {
  position:sticky;
  bottom:0;
  background:#ffeaa7;
  padding:10px;
  margin:10px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

.undo-bar button{
  margin-left:10px;
  padding:5px 10px;
  border:none;
  border-radius:6px;
  background:#ff4757;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <div>📍 派車回報系統</div>
  <div id="userNow">👤 未登入</div>

  <div class="header-right">
    <button class="header-btn clear-btn" onclick="clearLogs()">清空</button>
    <button class="header-btn logout-btn" onclick="logout()">退出</button>
  </div>
</div>

<div id="login">
  <input id="name" placeholder="輸入名字">
  <br>
  <button class="login-btn" onclick="start()">進入系統</button>
</div>

<div id="main">

<div class="buttons">
  <button class="action btn1" onclick="send('離開機場 ✈️')">離開機場</button>
  <button class="action btn2" onclick="send('往碼頭 🚢')">往碼頭</button>
  <button class="action btn3" onclick="send('往廣場 🏢')">往廣場</button>
  <button class="action btn4" onclick="send('往飯店 🏨')">往飯店</button>
  <button class="action btn5" onclick="send('經武酒窖')">經武酒窖</button>
  <button class="action btn6" onclick="send('山外圓環')">山外圓環</button>
  <button class="action btn7" onclick="sendGPS()">📍 GPS回報</button>
  <button class="action btn8" onclick="send('抵達')">抵達</button>
</div>

<div class="manual">
  <input id="manualText" placeholder="手動輸入回報...">
  <button onclick="sendManual()">送出</button>
</div>

<div id="undoBar" class="undo-bar" style="display:none;"></div>

<div id="chat"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "test-c845c.firebaseapp.com",
  databaseURL: "https://test-c845c-default-rtdb.firebaseio.com",
  projectId: "test-c845c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username="";
let messages={};
let lastClick=0;

/* 登入 */
window.onload=function(){
  let saved=localStorage.getItem("name");
  if(saved){
    username=saved;
    document.getElementById("name").value=saved;
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("userNow").innerText="👤 "+username;
  }
}

function start(){
  username=document.getElementById("name").value;
  if(!username) return alert("輸入名字");

  localStorage.setItem("name",username);
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
  document.getElementById("userNow").innerText="👤 "+username;
}

function logout(){
  localStorage.removeItem("name");
  location.reload();
}

/* 發送 */
function send(action){
  if(Date.now()-lastClick<1500) return;
  lastClick=Date.now();

  db.ref("logs").push({
    user:username,
    action,
    ts:Date.now(),
    deleted:false
  });
}

/* 手動 */
function sendManual(){
  let t=document.getElementById("manualText").value.trim();
  if(!t) return;
  send("📝 "+t);
  document.getElementById("manualText").value="";
}

/* GPS */
function sendGPS(){
  navigator.geolocation.getCurrentPosition(pos=>{
    db.ref("logs").push({
      user:username,
      action:"📍 GPS回報",
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      ts:Date.now(),
      deleted:false
    });
  });
}

/* 讀取 */
db.ref("logs").on("value",snap=>{
  messages=snap.val()||{};
  render();
});

/* 時間 */
function formatAgo(ts){
  let diff=Math.floor((Date.now()-ts)/1000);
  if(diff<60) return diff+"秒前";
  let m=Math.floor(diff/60);
  if(m<60) return m+"分鐘前";
  return Math.floor(m/60)+"小時前";
}

/* 回收倒數 */
let undoTimer=null;
let undoKey=null;
let undoCount=3;

function revoke(key){

  if(!confirm("確定回收？")) return;

  undoKey=key;
  undoCount=3;

  let bar=document.getElementById("undoBar");
  bar.style.display="block";

  bar.innerHTML=`⏳ ${undoCount}秒後刪除 <button onclick="cancelUndo()">取消</button>`;

  undoTimer=setInterval(()=>{

    undoCount--;

    if(undoCount<=0){
      clearInterval(undoTimer);
      db.ref("logs/"+undoKey).update({deleted:true});
      bar.style.display="none";
      return;
    }

    bar.innerHTML=`⏳ ${undoCount}秒後刪除 <button onclick="cancelUndo()">取消</button>`;

  },1000);
}

function cancelUndo(){
  clearInterval(undoTimer);
  document.getElementById("undoBar").style.display="none";
}

/* render */
function render(){

  let div=document.getElementById("chat");
  div.innerHTML="";

  let arr=Object.entries(messages);
  arr.sort((a,b)=>b[1].ts-a[1].ts);

  arr.forEach(([key,d],i)=>{

    if(d.deleted) return;

    let date=new Date(d.ts);

    let dateStr=
      date.getFullYear()+"/"+
      String(date.getMonth()+1).padStart(2,'0')+"/"+
      String(date.getDate()).padStart(2,'0');

    let timeStr=date.toLocaleTimeString();

    let gps="";

    if(d.lat){
      gps=`<div style="font-size:12px;margin-top:5px;">
        📍 <a target="_blank" href="https://maps.google.com/?q=${d.lat},${d.lng}">
          地圖
        </a>
      </div>`;
    }

    let msg=document.createElement("div");
    msg.className="msg";
    if(i===0) msg.classList.add("latest");

    msg.innerHTML=`
      <div class="row">
        <span class="name">${d.user}</span>
        <span class="action">${d.action}</span>

        <span class="time">
${dateStr}
${timeStr}
${formatAgo(d.ts)}
        </span>

        ${
          d.user===username
          ? `<button class="recycle-btn" onclick="revoke('${key}')">回收</button>`
          : ""
        }
      </div>

      ${gps}
    `;

    div.appendChild(msg);
  });
}

/* 清空 */
function clearLogs(){
  let pwd=prompt("密碼");
  if(pwd!=="338888") return;
  db.ref("logs").remove();
}

</script>

</body>
</html>
