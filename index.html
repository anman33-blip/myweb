<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>即時回報系統</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  background:#f5f6fa;
  font-size:18px;
}

.header {
  background:#2f3542;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#userNow {
  font-size:14px;
  color:white;
  opacity:0.9;
}

.header-right {
  display:flex;
  gap:8px;
}

.header-btn {
  padding:6px 10px;
  font-size:12px;
  border:none;
  border-radius:8px;
  color:white;
}

.clear-btn { background:#ff4757; }
.logout-btn { background:#57606f; }

#login {
  text-align:center;
  margin-top:60px;
}

input {
  padding:14px;
  width:80%;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
}

.login-btn {
  margin-top:15px;
  padding:14px 40px;
  border:none;
  background:#3742fa;
  color:white;
  border-radius:10px;
}

#main { display:none; }

.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:12px;
}

button.action {
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:white;
}

.btn1 { background:#ff4757; }
.btn2 { background:#1e90ff; }
.btn3 { background:#2ed573; }
.btn4 { background:#ffa502; }
.btn5 { background:#a55eea; }
.btn6 { background:#2f3542; }
.btn7 { background:#00c3ff; }
.btn8 { background:#2ed573; }

.manual {
  display:flex;
  gap:8px;
  padding:12px;
}

.manual input {
  flex:1;
  padding:12px;
}

.manual button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#57606f;
  color:white;
}

#chat {
  padding:12px;
  height:45vh;
  overflow-y:auto;
}

.msg {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.msg.latest {
  background:#e8f4ff;
  border-left:4px solid #1e90ff;
}

.row {
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
}

.name { font-weight:bold; min-width:60px; }
.action { flex:1; }

.time {
  font-size:12px;
  color:gray;
  min-width:130px;
  text-align:right;
  white-space:pre-line;
}

.recycle-btn {
  margin-left:5px;
  font-size:10px;
  padding:2px 6px;
  border:none;
  border-radius:6px;
  background:#ff4757;
  color:white;
}

.undo-bar{
  background:#ffeaa7;
  padding:10px;
  margin:10px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

.undo-bar button{
  margin-left:10px;
  padding:5px 10px;
  border:none;
  border-radius:6px;
  background:#ff4757;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <div>📍 派車回報系統</div>
  <div id="userNow">👤 未登入</div>

  <div class="header-right">
    <button class="header-btn clear-btn" onclick="clearLogs()">清空</button>
    <button class="header-btn logout-btn" onclick="logout()">退出</button>
  </div>
</div>

<div id="login">
  <input id="name" placeholder="輸入名字">
  <br>
  <button class="login-btn" onclick="start()">進入系統</button>
</div>

<div id="main">

<div class="buttons">
  <button class="action btn1" onclick="send('離開機場 ✈️')">離開機場</button>
  <button class="action btn2" onclick="send('往碼頭 🚢')">往碼頭</button>
  <button class="action btn3" onclick="send('往廣場 🏢')">往廣場</button>
  <button class="action btn4" onclick="send('往飯店 🏨')">往飯店</button>
  <button class="action btn5" onclick="send('經武酒窖')">經武酒窖</button>
  <button class="action btn6" onclick="send('山外圓環')">山外圓環</button>
  <button class="action btn7" onclick="sendGPS()">📍 GPS回報</button>
  <button class="action btn8" onclick="send('抵達')">抵達</button>
</div>

<div class="manual">
  <input id="manualText" placeholder="手動輸入回報...">
  <button onclick="sendManual()">送出</button>
</div>

<div id="chat"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "test-c845c.firebaseapp.com",
  databaseURL: "https://test-c845c-default-rtdb.firebaseio.com",
  projectId: "test-c845c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = "";
let lastClick = 0;
let messages = {};
let undoTimers = {};

/* 登入 */
window.onload = function(){
  let saved = localStorage.getItem("name");

  if(saved){
    username = saved;
    document.getElementById("name").value = saved;

    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";

    document.getElementById("userNow").innerText = "👤 " + username;
  }
}

function start(){
  username = document.getElementById("name").value;
  if(!username) return alert("請輸入名字");

  localStorage.setItem("name", username);

  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";

  document.getElementById("userNow").innerText = "👤 " + username;
}

function logout(){
  localStorage.removeItem("name");
  location.reload();
}

/* 發送 */
function send(action){

  let now = Date.now();
  if(now - lastClick < 2000) return;
  lastClick = now;

  db.ref("logs").push({
    user: username,
    action: action,
    ts: now,
    time: new Date().toLocaleString(),
    deleted: false
  });
}

/* 手動 */
function sendManual(){
  let text = document.getElementById("manualText").value.trim();
  if(!text) return;
  send("📝 " + text);
  document.getElementById("manualText").value="";
}

/* GPS（已修復連結資料） */
function sendGPS(){

  navigator.geolocation.getCurrentPosition(pos=>{

    db.ref("logs").push({
      user: username,
      action:"📍 GPS回報",
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      ts: Date.now(),
      time: new Date().toLocaleString(),
      deleted: false
    });

  });

}

/* 讀取 */
db.ref("logs").on("value", snap=>{
  messages = snap.val() || {};
  render();
});

/* 回收（倒數3秒） */
function revoke(key){

  let item = messages[key];
  if(!item) return;

  if(item.user !== username){
    alert("只能刪除自己訊息");
    return;
  }

  if(!confirm("是否刪除？")) return;

  db.ref("logs/"+key).update({deleted:true});

  let timeLeft = 3;

  let bar = document.createElement("div");
  bar.className="undo-bar";

  let btn = document.createElement("button");
  btn.innerText="取消 ("+timeLeft+")";

  btn.onclick=function(){
    clearInterval(timer);
    undo(key);
    bar.remove();
  };

  bar.innerHTML="已刪除 ";
  bar.appendChild(btn);

  document.getElementById("chat").prepend(bar);

  let timer = setInterval(()=>{

    timeLeft--;

    if(timeLeft<=0){
      clearInterval(timer);
      bar.remove();
      return;
    }

    btn.innerText="取消 ("+timeLeft+")";

  },1000);
}

/* 取消 */
function undo(key){
  db.ref("logs/"+key).update({deleted:false});
}

/* render（⭐ GPS修復點在這） */
function render(){

  let div = document.getElementById("chat");
  div.innerHTML = "";

  let arr = Object.entries(messages);
  arr.sort((a,b)=>b[1].ts - a[1].ts);

  arr.forEach(([key,d],i)=>{

    if(d.deleted) return;

    let gps = "";

    // ⭐ 修復：加回地圖連結
    if(d.lat && d.lng){
      gps = `
        <div style="margin-top:5px;font-size:13px;">
          📍 <a target="_blank" href="https://www.google.com/maps?q=${d.lat},${d.lng}">
            開啟地圖
          </a>
        </div>
      `;
    }

    let msg = document.createElement("div");
    msg.className="msg";
    if(i===0) msg.classList.add("latest");

    msg.innerHTML=`
      <div class="row">
        <span class="name">${d.user}</span>
        <span class="action">${d.action}</span>
        <span class="time">${d.time}</span>

        ${
          d.user === username
          ? `<button class="recycle-btn" onclick="revoke('${key}')">回收</button>`
          : ""
        }
      </div>
      ${gps}
    `;

    div.appendChild(msg);
  });
}

/* 清空 */
function clearLogs(){
  let pwd = prompt("密碼");
  if(pwd!=="338888") return alert("錯誤");
  db.ref("logs").remove();
}

</script>

</body>
</html>
