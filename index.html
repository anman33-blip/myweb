<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>派車即時回報</title>

<!-- PWA / 類APP -->
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#f5f6fa;
}

/* 標題 */
.header {
  background:#2f3542;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* 登入 */
#login {
  text-align:center;
  margin-top:50px;
}

input {
  padding:12px;
  width:70%;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

.login-btn {
  margin-top:10px;
  padding:12px 30px;
  border:none;
  background:#3742fa;
  color:white;
  border-radius:8px;
  font-size:16px;
}

/* 主畫面 */
#main {
  display:none;
}

/* 按鈕區 */
.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

button.action {
  padding:15px;
  font-size:16px;
  border:none;
  border-radius:12px;
  color:white;
}

/* 顏色 */
.btn1 { background:#ff4757; }
.btn2 { background:#1e90ff; }
.btn3 { background:#2ed573; }
.btn4 { background:#ffa502; }
.btn5 { background:#8e44ad; }
.btn6 { background:#16a085; }

/* 聊天區 */
#chat {
  padding:10px;
  height:55vh;
  overflow-y:auto;
}

/* 訊息卡片 */
.msg {
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.name {
  font-weight:bold;
}

.time {
  font-size:12px;
  color:gray;
}

/* 上方工具列 */
.tools {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}
.tools button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">📍 派車即時回報-機場出發</div>

<!-- 登入 -->
<div id="login">
  <input id="name" placeholder="輸入名字">
  <br>
  <button class="login-btn" onclick="start()">進入系統</button>
</div>

<!-- 主畫面 -->
<div id="main">

  <!-- 工具列 -->
  <div class="tools">
    <button onclick="enableSound()">🔔 開啟聲音</button>
    <button onclick="clearChat()">🧹 清空</button>
  </div>

  <!-- 按鈕 -->
  <div class="buttons">
    <button class="action btn1" onclick="send('離開機場 ✈️')">離開機場</button>
    <button class="action btn2" onclick="send('往碼頭 🚢')">往碼頭</button>
    <button class="action btn3" onclick="send('往廣場 🏢')">往廣場</button>
    <button class="action btn4" onclick="send('往飯店 🏨')">往飯店</button>
    <button class="action btn5" onclick="send('經武酒窖')">經武酒窖</button>
    <button class="action btn6" onclick="send('山外圓環')">山外圓環</button>
  </div>

  <!-- 聊天 -->
  <div id="chat"></div>

</div>

<script>

// Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyAnMOwK8Awcu_hxdyUjml8o88Anznd9m3Q",
  authDomain: "test-c845c.firebaseapp.com",
  databaseURL: "https://test-c845c-default-rtdb.firebaseio.com",
  projectId: "test-c845c",
  storageBucket: "test-c845c.firebasestorage.app",
  messagingSenderId: "126005172872",
  appId: "1:126005172872:web:f3eca6affd5d09d0e59d3d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = "";
let lastClick = 0;

// 🔔 聲音
let audio = new Audio("https://www.soundjay.com/buttons/sound/beep-07.mp3");
let soundEnabled = false;

function enableSound(){
  audio.play().then(()=>{
    soundEnabled = true;
    alert("聲音已啟用");
  }).catch(()=>{
    alert("請再點一次啟用聲音");
  });
}

// 記住名字
window.onload = function(){
  let saved = localStorage.getItem("name");
  if(saved){
    document.getElementById("name").value = saved;
  }
}

// 登入
function start(){
  username = document.getElementById("name").value;

  if(!username){
    alert("請輸入名字");
    return;
  }

  localStorage.setItem("name", username);

  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
}

// 發送
function send(action){
  let now = Date.now();

  if(now - lastClick < 2000){
    alert("請勿連續點擊");
    return;
  }

  lastClick = now;

  db.ref("logs").push({
    user: username,
    action: action,
    time: new Date().toLocaleTimeString()
  });
}

// 清空
function clearChat(){
  let pwd = prompt("輸入清除密碼");
  if(pwd === "338888"){
    db.ref("logs").remove();
  }
}

// 即時監聽
db.ref("logs").limitToLast(50).on("child_added", snapshot => {
  let d = snapshot.val();

  if(soundEnabled){
    audio.play();
  }

  let div = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.className = "msg";

  msg.innerHTML = `
    <div class="name">${d.user}</div>
    <div>${d.action}</div>
    <div class="time">${d.time}</div>
  `;

  div.appendChild(msg);
  div.scrollTop = div.scrollHeight;
});

</script>

</body>
</html>
