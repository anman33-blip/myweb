<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>即時回報系統</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  background:#f5f6fa;
  font-size:18px;
}

/* HEADER */
.header {
  background:#2f3542;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.online {
  font-size:14px;
  color:#2ed573;
}

.header-right {
  display:flex;
  gap:8px;
}

.header-btn {
  padding:6px 10px;
  font-size:12px;
  border:none;
  border-radius:8px;
  color:white;
}

.clear-btn { background:#ff4757; }
.logout-btn { background:#57606f; }

/* LOGIN */
#login {
  text-align:center;
  margin-top:60px;
}

input {
  padding:14px;
  width:80%;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
}

.login-btn {
  margin-top:15px;
  padding:14px 40px;
  border:none;
  background:#3742fa;
  color:white;
  border-radius:10px;
}

/* MAIN */
#main { display:none; }

/* BUTTONS */
.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:12px;
}

button.action {
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:white;
}

.btn1 { background:#ff4757; }
.btn2 { background:#1e90ff; }
.btn3 { background:#2ed573; }
.btn4 { background:#ffa502; }
.btn5 { background:#a55eea; }
.btn6 { background:#2f3542; }
.btn7 { background:#00c3ff; }
.btn8 { background:#d900ff; }
/* manual */
.manual {
  display:flex;
  gap:8px;
  padding:12px;
}

.manual input {
  flex:1;
  padding:12px;
}

.manual button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#57606f;
  color:white;
}

/* CHAT */
#chat {
  padding:12px;
  height:45vh;
  overflow-y:auto;
}

.msg {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.msg.latest {
  background:#e8f4ff;
  border-left:4px solid #1e90ff;
}

.row {
  display:flex;
  justify-content:space-between;
  gap:8px;
}

.name { font-weight:bold; min-width:60px; }
.action { flex:1; }
.time { font-size:12px; color:gray; min-width:130px; text-align:right; }
</style>
</head>

<body>

<div class="header">
  <div>📍 派車回報系統</div>

  <div style="display:flex; align-items:center; gap:10px;">
    <div class="online" id="online">🟢 在線：0</div>

    <div class="header-right">
      <button class="header-btn clear-btn" onclick="clearLogs()">清空</button>
      <button class="header-btn logout-btn" onclick="logout()">退出</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login">
  <input id="name" placeholder="輸入名字">
  <br>
  <button class="login-btn" onclick="start()">進入系統</button>
</div>

<!-- MAIN -->
<div id="main">

<div class="buttons">
  <button class="action btn1" onclick="send('離開機場 ✈️')">離開機場</button>
  <button class="action btn2" onclick="send('往碼頭 🚢')">往碼頭</button>
  <button class="action btn3" onclick="send('往廣場 🏢')">往廣場</button>
  <button class="action btn4" onclick="send('往飯店 🏨')">往飯店</button>
  <button class="action btn5" onclick="send('經武酒窖')">經武酒窖</button>
  <button class="action btn6" onclick="send('新市圓環')">山外圓環</button>
  <button class="action btn7" onclick="sendGPS()">📍 GPS回報</button>
  <button class="action btn8" onclick="sendGPS()">抵達</button>
</div>

<div class="manual">
  <input id="manualText" placeholder="手動輸入回報...">
  <button onclick="sendManual()">送出</button>
</div>

<div id="chat"></div>

</div>

<audio id="notifySound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "test-c845c.firebaseapp.com",
  databaseURL: "https://test-c845c-default-rtdb.firebaseio.com",
  projectId: "test-c845c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = "";
let messages = [];
let lastClick = 0;

/* 🔊 防爆音 */
let lastSound = 0;

function playSound(){
  let now = Date.now();
  if(now - lastSound < 1000) return;
  lastSound = now;

  let audio = document.getElementById("notifySound");

  audio.currentTime = 0;
  audio.play().catch(()=>{});

  setTimeout(()=>{
    audio.currentTime = 0;
    audio.play().catch(()=>{});
  },200);
}

/* 日期時間 */
function getTime(){
  let d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${d.toLocaleTimeString()}`;
}

/* 自動登入 */
window.onload = function(){

  let saved = localStorage.getItem("name");

  if(saved){
    username = saved;
    document.getElementById("name").value = saved;

    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";

    setOnline();
  }
}

/* 登入 */
function start(){
  username = document.getElementById("name").value;

  if(!username){
    alert("請輸入名字");
    return;
  }

  localStorage.setItem("name", username);

  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";

  setOnline();
}

/* 退出 */
function logout(){
  localStorage.removeItem("name");
  location.reload();
}

/* 發送 */
function send(action){

  let now = Date.now();

  if(now - lastClick < 2000){
    alert("請勿連續點擊");
    return;
  }

  lastClick = now;

  db.ref("logs").push({
    user: username,
    action: action,
    time: getTime(),
    ts: now
  });
}

/* 手動 */
function sendManual(){
  let text = document.getElementById("manualText").value;
  if(!text) return;
  send("📝 " + text);
  document.getElementById("manualText").value = "";
}

/* GPS */
function sendGPS(){

  navigator.geolocation.getCurrentPosition(pos => {

    db.ref("logs").push({
      user: username,
      action: "📍 GPS回報",
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      time: getTime(),
      ts: Date.now()
    });

  });
}

/* 在線 */
function setOnline(){
  let ref = db.ref("online/" + username);
  ref.set(true);
  ref.onDisconnect().remove();
}

db.ref("online").on("value", snap => {
  document.getElementById("online").innerText =
    `🟢 在線：${snap.numChildren()}`;
});

/* 訊息 */
db.ref("logs").limitToLast(50).on("child_added", snap => {

  messages.push(snap.val());
  messages.sort((a,b)=>b.ts-a.ts);

  playSound();
  render();
});

/* render */
function render(){

  let div = document.getElementById("chat");
  div.innerHTML = "";

  messages.forEach((d,i) => {

    let gps = "";

    if(d.lat){
      gps = `<br><a target="_blank" href="https://maps.google.com/?q=${d.lat},${d.lng}">📍 地圖</a>`;
    }

    let msg = document.createElement("div");
    msg.className = "msg";

    if(i === 0){
      msg.classList.add("latest");
    }

    msg.innerHTML = `
      <div class="row">
        <span class="name">${d.user}</span>
        <span class="action">${d.action}</span>
        <span class="time">${d.time}</span>
      </div>
      ${gps}
    `;

    div.appendChild(msg);
  });
}

/* 清空 */
function clearLogs(){

  let pwd = prompt("請輸入管理密碼");

  if(pwd !== "338888"){
    alert("密碼錯誤");
    return;
  }

  db.ref("logs").remove();
  messages = [];
  document.getElementById("chat").innerHTML = "";
}

</script>

</body>
</html>
