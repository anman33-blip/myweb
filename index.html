<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>派車即時回報系統</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
  background:#f5f6fa;
  font-size:18px;
}

.header {
  background:#2f3542;
  color:white;
  padding:14px;
  text-align:center;
  font-size:20px;
  position:relative;
}

.online {
  font-size:14px;
  margin-top:4px;
  color:#2ed573;
}

.clear-btn {
  position:absolute;
  right:10px;
  top:10px;
  padding:6px 10px;
  font-size:12px;
  border:none;
  border-radius:8px;
  background:#ff4757;
  color:white;
}

#login {
  text-align:center;
  margin-top:60px;
}

input {
  padding:14px;
  width:80%;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
}

.login-btn {
  margin-top:15px;
  padding:14px 40px;
  border:none;
  background:#3742fa;
  color:white;
  border-radius:10px;
  font-size:18px;
}

#main { display:none; }

.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

button.action {
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:14px;
  color:white;
  font-weight:bold;
}

.btn1 { background:#ff4757; }
.btn2 { background:#1e90ff; }
.btn3 { background:#2ed573; }
.btn4 { background:#ffa502; }
.btn5 { background:#a55eea; }
.btn6 { background:#2f3542; }
.btn7 { background:#00c3ff; }

.manual {
  padding:12px;
  display:flex;
  gap:8px;
}

.manual input {
  flex:1;
  padding:12px;
  font-size:16px;
}

.manual button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#57606f;
  color:white;
}

#chat {
  padding:12px;
  height:45vh;
  overflow-y:auto;
}

.msg {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.name {
  font-weight:bold;
  min-width:70px;
}

.action { flex:1; }

.time {
  font-size:12px;
  color:gray;
  min-width:70px;
  text-align:right;
}

a {
  font-size:14px;
  color:#1e90ff;
}
</style>
</head>

<body>

<div class="header">
📍 派車即時回報
<div class="online" id="online">🟢 在線：0人</div>
<button class="clear-btn" onclick="clearLogs()">清空</button>
</div>

<!-- 登入 -->
<div id="login">
  <input id="name" placeholder="輸入名字">
  <br>
  <button class="login-btn" onclick="start()">進入系統</button>
</div>

<!-- 主畫面 -->
<div id="main">

<div class="buttons">
  <button class="action btn1" onclick="send('離開機場 ✈️')">離開機場</button>
  <button class="action btn2" onclick="send('往碼頭 🚢')">往碼頭</button>
  <button class="action btn3" onclick="send('往廣場 🏢')">往廣場</button>
  <button class="action btn4" onclick="send('往飯店 🏨')">往飯店</button>
  <button class="action btn5" onclick="send('經武酒窖')">經武酒窖</button>
  <button class="action btn6" onclick="send('山外圓環')">山外圓環</button>
  <button class="action btn7" onclick="sendGPS()">📍 GPS回報</button>
</div>

<div class="manual">
  <input id="manualText" placeholder="手動輸入回報...">
  <button onclick="sendManual()">送出</button>
</div>

<div id="chat"></div>

</div>

<!-- 🔊 音效 -->
<audio id="notifySound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "test-c845c.firebaseapp.com",
  databaseURL: "https://test-c845c-default-rtdb.firebaseio.com",
  projectId: "test-c845c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = "";
let messages = [];
let lastClick = 0;
let firstLoad = true;

/* 🔊 嗶嗶兩聲 */
function playSound(){
  let audio = document.getElementById("notifySound");

  audio.currentTime = 0;
  audio.play().catch(()=>{});

  setTimeout(()=>{
    audio.currentTime = 0;
    audio.play().catch(()=>{});
  }, 250);
}

/* 🚀 自動登入 */
window.onload = function(){

  let saved = localStorage.getItem("name");

  if(saved){
    document.getElementById("name").value = saved;

    username = saved;
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";

    setOnline();
  }
}

/* 登入 */
function start(){

  username = document.getElementById("name").value;

  if(!username){
    alert("請輸入名字");
    return;
  }

  localStorage.setItem("name", username);

  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";

  setOnline();
}

/* 發送 */
function send(action){

  let now = Date.now();

  if(now - lastClick < 2000){
    alert("請勿連續點擊");
    return;
  }

  lastClick = now;

  db.ref("logs").push({
    user: username,
    action: action,
    time: new Date().toLocaleTimeString(),
    ts: now
  });
}

/* 手動 */
function sendManual(){

  let text = document.getElementById("manualText").value;

  if(!text) return;

  db.ref("logs").push({
    user: username,
    action: "📝 " + text,
    time: new Date().toLocaleTimeString(),
    ts: Date.now()
  });

  document.getElementById("manualText").value = "";
}

/* GPS */
function sendGPS(){

  navigator.geolocation.getCurrentPosition(pos => {

    db.ref("logs").push({
      user: username,
      action: "📍 GPS回報",
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      time: new Date().toLocaleTimeString(),
      ts: Date.now()
    });

  });
}

/* 在線 */
function setOnline(){
  let ref = db.ref("online/" + username);
  ref.set(true);
  ref.onDisconnect().remove();
}

db.ref("online").on("value", snap => {
  document.getElementById("online").innerText =
    `🟢 在線：${snap.numChildren()}人`;
});

/* 訊息 */
db.ref("logs").limitToLast(50).on("child_added", snap => {

  messages.push(snap.val());
  messages.sort((a,b)=>b.ts-a.ts);

  if(!firstLoad){
    playSound();
  }

  render();
});

/* render */
function render(){

  let div = document.getElementById("chat");
  div.innerHTML = "";

  messages.forEach(d => {

    let gps = "";

    if(d.lat){
      gps = `<br><a target="_blank" href="https://maps.google.com/?q=${d.lat},${d.lng}">
      📍 查看地圖</a>`;
    }

    let msg = document.createElement("div");
    msg.className = "msg";

    msg.innerHTML = `
      <div class="row">
        <span class="name">${d.user}</span>
        <span class="action">${d.action}</span>
        <span class="time">${d.time}</span>
      </div>
      ${gps}
    `;

    div.appendChild(msg);
  });

  firstLoad = false;
}

/* 清空 */
function clearLogs(){

  let pwd = prompt("請輸入管理密碼");

  if(pwd !== "338888"){
    alert("密碼錯誤");
    return;
  }

  if(confirm("確定清空？")){
    db.ref("logs").remove();
    messages = [];
    document.getElementById("chat").innerHTML = "";
  }
}

</script>

</body>
</html>
