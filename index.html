<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>即時回報系統</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#f5f6fa;
  font-size:18px;
}

/* 標題 */
.header {
  background:#2f3542;
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
}

/* 登入 */
#login {
  text-align:center;
  margin-top:60px;
}

input {
  padding:14px;
  width:80%;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
}

.login-btn {
  margin-top:15px;
  padding:14px 40px;
  border:none;
  background:#3742fa;
  color:white;
  border-radius:10px;
  font-size:18px;
}

/* 主畫面 */
#main {
  display:none;
}

/* 按鈕 */
.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

button.action {
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:14px;
  color:white;
  font-weight:bold;
}

/* 顏色 */
.btn1 { background:#ff4757; }
.btn2 { background:#1e90ff; }
.btn3 { background:#2ed573; }
.btn4 { background:#ffa502; }
.btn5 { background:#a55eea; }
.btn6 { background:#2f3542; }

/* 訊息區 */
#chat {
  padding:12px;
  height:55vh;
  overflow-y:auto;
}

/* 訊息卡片 */
.msg {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* 🔥 同行顯示 */
.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  font-size:16px;
}

.name {
  font-weight:bold;
  min-width:70px;
}

.action {
  flex:1;
  text-align:left;
}

.time {
  font-size:12px;
  color:gray;
  min-width:70px;
  text-align:right;
}
</style>
</head>

<body>

<div class="header">📍 派車即時回報-機場出發</div>

<!-- 登入 -->
<div id="login">
  <input id="name" placeholder="輸入名字">
  <br>
  <button class="login-btn" onclick="start()">進入系統</button>
</div>

<!-- 主畫面 -->
<div id="main">

  <div class="buttons">
    <button class="action btn1" onclick="send('離開機場 ✈️')">離開機場</button>
    <button class="action btn2" onclick="send('往碼頭 🚢')">往碼頭</button>
    <button class="action btn3" onclick="send('往廣場 🏢')">往廣場</button>
    <button class="action btn4" onclick="send('往飯店 🏨')">往飯店</button>
    <button class="action btn5" onclick="send('經武酒窖')">經武酒窖</button>
    <button class="action btn6" onclick="send('山外圓環')">山外圓環</button>
  </div>

  <div id="chat"></div>

</div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAnMOwK8Awcu_hxdyUjml8o88Anznd9m3Q",
  authDomain: "test-c845c.firebaseapp.com",
  databaseURL: "https://test-c845c-default-rtdb.firebaseio.com",
  projectId: "test-c845c",
  storageBucket: "test-c845c.firebasestorage.app",
  messagingSenderId: "126005172872",
  appId: "1:126005172872:web:f3eca6affd5d09d0e59d3d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = "";
let messages = [];
let lastClick = 0;

// 載入名字
window.onload = function(){
  let saved = localStorage.getItem("name");
  if(saved){
    document.getElementById("name").value = saved;
  }
}

// 登入
function start(){
  username = document.getElementById("name").value;

  if(!username){
    alert("請輸入名字");
    return;
  }

  localStorage.setItem("name", username);

  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
}

// 發送訊息
function send(action){
  let now = Date.now();

  if(now - lastClick < 2000){
    alert("請勿連續點擊");
    return;
  }

  lastClick = now;

  db.ref("logs").push({
    user: username,
    action: action,
    time: new Date().toLocaleTimeString(),
    ts: now   // 🔥 用來排序
  });
}

// 讀取資料
db.ref("logs").limitToLast(50).on("child_added", snapshot => {
  let d = snapshot.val();

  messages.push(d);

  // 🔥 最新在上 + 穩定排序
  messages.sort((a, b) => b.ts - a.ts);

  renderChat();
});

// 渲染畫面
function renderChat(){
  let div = document.getElementById("chat");
  div.innerHTML = "";

  messages.forEach(d => {
    let msg = document.createElement("div");
    msg.className = "msg";

    msg.innerHTML = `
      <div class="row">
        <span class="name">${d.user}</span>
        <span class="action">${d.action}</span>
        <span class="time">${d.time}</span>
      </div>
    `;

    div.appendChild(msg);
  });
}

</script>

</body>
</html>
