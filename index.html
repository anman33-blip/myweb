<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<!-- 📱 手機必加：否則會縮放錯誤 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>即時回報系統</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#f5f6fa;
  font-size:18px; /* 🔥 全域放大 */
}

/* 標題 */
.header {
  background:#2f3542;
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
}

/* 登入 */
#login {
  text-align:center;
  margin-top:60px;
}

input {
  padding:14px;
  width:80%;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
}

.login-btn {
  margin-top:15px;
  padding:14px 40px;
  border:none;
  background:#3742fa;
  color:white;
  border-radius:10px;
  font-size:18px;
}

/* 主畫面 */
#main {
  display:none;
}

/* 按鈕區 */
.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

button.action {
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:14px;
  color:white;
  font-weight:bold;
}

/* 🎨 每個按鈕不同顏色 */
.btn1 { background:#ff4757; }   /* 紅 */
.btn2 { background:#1e90ff; }   /* 藍 */
.btn3 { background:#2ed573; }   /* 綠 */
.btn4 { background:#ffa502; }   /* 橘 */
.btn5 { background:#a55eea; }   /* 紫 */
.btn6 { background:#2f3542; }   /* 深灰 */

/* 聊天區 */
#chat {
  padding:12px;
  height:55vh;
  overflow-y:auto;
}

/* 訊息卡片 */
.msg {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  font-size:16px;
}

.name {
  font-weight:bold;
  font-size:17px;
}

.time {
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<div class="header">📍 派車即時回報-機場出發</div>

<!-- 登入 -->
<div id="login">
  <input id="name" placeholder="輸入名字">
  <br>
  <button class="login-btn" onclick="start()">進入系統</button>
</div>

<!-- 主畫面 -->
<div id="main">

  <div class="buttons">
    <button class="action btn1" onclick="send('離開機場 ✈️')">離開機場</button>
    <button class="action btn2" onclick="send('往碼頭 🚢')">往碼頭</button>
    <button class="action btn3" onclick="send('往廣場 🏢')">往廣場</button>
    <button class="action btn4" onclick="send('往飯店 🏨')">往飯店</button>
    <button class="action btn5" onclick="send('經武酒窖')">經武酒窖</button>
    <button class="action btn6" onclick="send('山外圓環')">山外圓環</button>
  </div>

  <div id="chat"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAnMOwK8Awcu_hxdyUjml8o88Anznd9m3Q",
  authDomain: "test-c845c.firebaseapp.com",
  databaseURL: "https://test-c845c-default-rtdb.firebaseio.com",
  projectId: "test-c845c",
  storageBucket: "test-c845c.firebasestorage.app",
  messagingSenderId: "126005172872",
  appId: "1:126005172872:web:f3eca6affd5d09d0e59d3d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = "";
let lastClick = 0;

window.onload = function(){
  let saved = localStorage.getItem("name");
  if(saved){
    document.getElementById("name").value = saved;
  }
}

function start(){
  username = document.getElementById("name").value;

  if(!username){
    alert("請輸入名字");
    return;
  }

  localStorage.setItem("name", username);

  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
}

function send(action){
  let now = Date.now();

  if(now - lastClick < 2000){
    alert("請勿連續點擊");
    return;
  }

  lastClick = now;

  db.ref("logs").push({
    user: username,
    action: action,
    time: new Date().toLocaleTimeString()
  });
}
db.ref("logs").limitToLast(50).on("child_added", snapshot => {
  let d = snapshot.val();

  let div = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.className = "msg";

  msg.innerHTML = `
    <div class="name">${d.user}</div>
    <div>${d.action}</div>
    <div class="time">${d.time}</div>
  `;

  div.appendChild(msg);
  div.scrollTop = div.scrollHeight;
});

</script>

</body>
</html>
